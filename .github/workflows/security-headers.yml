name: Security Headers

on:
  push:
    branches: [main]
    paths:
      - "public/_headers"
      - "scripts/check-headers.mjs"
      - "tests/check-headers.test.mjs"
      - "scripts/check-route-headers.mjs"
      - "src/routes/__root.tsx"
      - ".github/workflows/security-headers.yml"
      - "vite.config.*"
      - "package.json"
      - "bun.lockb"
      - "bun.lock"
  pull_request:
    paths:
      - "public/_headers"
      - "scripts/check-headers.mjs"
      - "tests/check-headers.test.mjs"
      - "scripts/check-route-headers.mjs"
      - "src/routes/__root.tsx"
      - ".github/workflows/security-headers.yml"
      - "vite.config.*"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Optional URL to validate instead of a local preview build (e.g. https://example.com)"
        required: false

jobs:
  headers:
    name: Validate response headers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        if: ${{ github.event.inputs.base_url == '' }}
        run: bun install --frozen-lockfile

      # Unit-test the header parser/normaliser before the network probes so a
      # comparator regression fails fast without waiting for a build + server.
      - name: Unit tests (scripts/check-headers.mjs)
        run: node --test tests/check-headers.test.mjs

      - name: Build site
        if: ${{ github.event.inputs.base_url == '' }}
        run: bun run build

      # Serve the actual built Worker (Nitro's `cloudflare-module` preset —
      # see vite.config.ts). This app deploys as a Worker with an `assets`
      # binding, not Cloudflare Pages, so `wrangler dev` against the
      # generated dist/server/wrangler.json is what makes _headers-driven
      # static-asset headers AND the Worker's own SSR middleware headers
      # both observable, matching production. `--bun` is deliberately
      # omitted: wrangler does not support running under the Bun runtime.
      - name: Start local Worker server
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          bunx wrangler@4.110.0 dev -c dist/server/wrangler.json \
            --port 4173 --ip 127.0.0.1 \
            > wrangler.log 2>&1 &
          echo $! > wrangler.pid
          for i in $(seq 1 40); do
            if curl -fsS -o /dev/null http://127.0.0.1:4173/; then
              echo "server up"; exit 0
            fi
            sleep 0.5
          done
          echo "server did not start"; cat wrangler.log; exit 1

      - name: Validate headers (local build)
        if: ${{ github.event.inputs.base_url == '' }}
        run: node scripts/check-headers.mjs http://127.0.0.1:4173

      - name: Validate per-route headers + CSP (local build)
        if: ${{ github.event.inputs.base_url == '' }}
        run: node scripts/check-route-headers.mjs http://127.0.0.1:4173

      - name: Validate headers (remote URL)
        if: ${{ github.event.inputs.base_url != '' }}
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
        run: node scripts/check-headers.mjs "$BASE_URL"

      - name: Validate per-route headers + CSP (remote URL)
        if: ${{ github.event.inputs.base_url != '' }}
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
        run: node scripts/check-route-headers.mjs "$BASE_URL"


      # The Worker's own console.error output (including the stack trace for
      # any unhandled SSR exception - see src/server.ts's catch block) lands
      # in wrangler.log, not in this step's own output, since the server runs
      # backgrounded in a separate step's shell. Kill it and poll for actual
      # exit (kill alone doesn't wait - the process's stdout redirection can
      # still have unflushed, unwritten lines at that instant) before
      # reading the file, otherwise the tail of the log - exactly the part
      # covering the most recent requests - can be silently missing.
      # Surfaced every run (collapsed) so an intermittent 500 - like the one
      # seen validating HEAD on the home route - leaves the actual exception
      # in the job log instead of just a bare "HTTP 500" from the
      # header-check script.
      - name: Stop server and print its log
        if: always() && github.event.inputs.base_url == ''
        run: |
          if [ -f wrangler.pid ]; then
            pid="$(cat wrangler.pid)"
            kill "$pid" 2>/dev/null || true
            for i in $(seq 1 20); do
              kill -0 "$pid" 2>/dev/null || break
              sleep 0.25
            done
          fi
          echo "::group::wrangler dev log (wrangler.log)"
          cat wrangler.log || echo "(no wrangler.log)"
          echo "::endgroup::"
