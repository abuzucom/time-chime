name: Nightly Header Drift Check

# Re-runs the security-header validators against the deployed production
# origin on a schedule so a regression introduced by a CDN config change,
# hosting-provider update, or accidental `_headers` deletion is surfaced
# within 24 hours instead of on the next PR.
#
# Failures open a tracking issue automatically (see the "Report drift" step).

on:
  schedule:
    # 07:17 UTC nightly — off-the-hour to avoid the GitHub cron stampede.
    - cron: "17 7 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override the production URL to probe (defaults to vars.PRODUCTION_BASE_URL)."
        required: false

concurrency:
  group: nightly-header-drift
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: Probe production headers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Resolve base URL
        id: resolve
        env:
          INPUT_URL: ${{ github.event.inputs.base_url }}
          VAR_URL: ${{ vars.PRODUCTION_BASE_URL }}
        run: |
          URL="${INPUT_URL:-$VAR_URL}"
          if [ -z "$URL" ]; then
            echo "::error::No base URL configured. Set the repository variable PRODUCTION_BASE_URL or supply one via workflow_dispatch."
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Probing $URL"

      - name: Validate _headers spec against production
        id: spec
        env:
          BASE_URL: ${{ steps.resolve.outputs.url }}
        run: node scripts/check-headers.mjs "$BASE_URL" | tee spec.log

      - name: Validate per-route CSP + headers against production
        id: routes
        # Continue on failure so both logs land in the issue body below.
        continue-on-error: true
        env:
          BASE_URL: ${{ steps.resolve.outputs.url }}
        run: node scripts/check-route-headers.mjs "$BASE_URL" | tee routes.log


      - name: Report drift (open or update tracking issue)
        if: failure() || steps.routes.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          BASE_URL: ${{ steps.resolve.outputs.url }}
        with:
          script: |
            const fs = require('fs');
            const read = (p) => { try { return fs.readFileSync(p, 'utf8').slice(-6000); } catch { return '(no output captured)'; } };
            const spec = read('spec.log');
            const routes = read('routes.log');
            const title = `[header-drift] Production headers regressed on ${process.env.BASE_URL}`;
            const body = [
              `The nightly header-drift job detected a regression on **${process.env.BASE_URL}**.`,
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '### `check-headers.mjs` (spec vs. live)',
              '```',
              spec,
              '```',
              '',
              '### `check-route-headers.mjs` (per-route CSP + headers)',
              '```',
              routes,
              '```',
            ].join('\n');

            // Re-use an existing open issue with the same title instead of
            // opening a duplicate each night.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'header-drift',
              per_page: 100,
            });
            const match = existing.find((i) => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
              core.notice(`Updated existing drift issue #${match.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['header-drift', 'security'],
              });
              core.notice(`Opened new drift issue #${created.data.number}`);
            }

      - name: Fail the job if any probe failed
        if: steps.routes.outcome == 'failure'
        run: exit 1
