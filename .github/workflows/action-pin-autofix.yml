name: Auto-pin GitHub Actions

# Keeps every third-party GitHub Action referenced from this repo's
# workflows pinned to a commit SHA (see scripts/check-action-pins.mjs).
# Runs only on same-repo triggers, never on pull_request/pull_request_target,
# so it never executes with a write-scoped token against fork-controlled
# workflow content. Proposes fixes as a draft PR for human review instead of
# pushing directly to main or failing a check.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/check-action-pins.mjs"
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC — after Dependabot's own 06:00 actions sweep
  workflow_dispatch:

permissions:
  contents: write # push the fix branch
  pull-requests: write # open/update the draft PR

concurrency:
  group: action-pin-autofix
  cancel-in-progress: false

jobs:
  autofix:
    name: Pin unpinned GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      BRANCH: automation/pin-github-actions
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve and pin unpinned actions
        run: node scripts/check-action-pins.mjs --fix

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update draft PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Pick up any prior run's branch so --force-with-lease can detect
          # (and refuse to clobber) unexpected concurrent changes to it.
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" 2>/dev/null || true
          git checkout -B "$BRANCH"
          git add .github/workflows
          git commit -m "chore(actions): pin unpinned GitHub Actions to commit SHAs"
          git push --force-with-lease origin "$BRANCH"

          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --draft \
              --title "chore(actions): pin unpinned GitHub Actions to commit SHAs" \
              --body "Automated: resolves every mutable-tag \`uses:\` reference in .github/workflows to its current commit SHA, matching this repo's existing pinning convention. Generated by \`node scripts/check-action-pins.mjs --fix\`. Review the resolved SHAs before merging." \
              --base main \
              --head "$BRANCH"
          else
            echo "updated existing draft PR #$existing"
          fi
