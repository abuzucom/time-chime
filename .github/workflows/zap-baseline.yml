name: OWASP ZAP Baseline

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to scan (defaults to repository variable ZAP_TARGET_URL)"
        required: false

permissions: {}

concurrency:
  group: zap-baseline
  cancel-in-progress: false

jobs:
  baseline:
    name: ZAP baseline scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # commit the updated compliance report
      issues: write # ZAP action opens/updates a tracking issue on findings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve target URL
        id: target
        env:
          INPUT_URL: ${{ github.event.inputs.target_url }}
          VAR_URL: ${{ vars.ZAP_TARGET_URL }}
        run: |
          URL="${INPUT_URL:-$VAR_URL}"
          if [ -z "$URL" ]; then
            echo "::error::No target URL. Set repo variable ZAP_TARGET_URL or provide workflow_dispatch input."
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Scanning $URL"

      - name: Run OWASP ZAP baseline
        id: zap
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a -j -m 5 -T 20"
          artifact_name: zap-baseline-report
          fail_action: false # never fail the workflow; policy in rules.tsv decides
          allow_issue_writing: true

      - name: Update docs/COMPLIANCE.md
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
          REPORT_JSON: report_json.json
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/update-zap-report.mjs

      - name: Commit updated compliance report
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- docs/COMPLIANCE.md; then
            echo "No changes to docs/COMPLIANCE.md"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/COMPLIANCE.md
          git commit -m "chore(security): refresh ZAP baseline scan results"
          git push
